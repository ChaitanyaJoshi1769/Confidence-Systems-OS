global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'confidence-systems-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'opensearch'
    static_configs:
      - targets: ['localhost:9200']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
